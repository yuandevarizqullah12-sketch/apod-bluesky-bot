name: Daily APOD

on:
  schedule:
    # Runs every hour from 12:00 to 18:00 WIB (UTC+7)
    # UTC: 05:00, 06:00, ..., 11:00
    - cron: '0 5,6,7,8,9,10,11 * * *'
  workflow_dispatch:  # allow manual trigger

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # We need full history to push changes
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily APOD job
        env:
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_PASSWORD: ${{ secrets.BSKY_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python apod.py daily

      - name: Commit state changes (if any)
        # The script already does this, but we keep a fallback
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json && git commit -m "Update APOD state [skip ci]" && git push || true